<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OOM's Desktop 🐧</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://avatars.githubusercontent.com/u/64982545?v=4">
    <link rel="apple-touch-icon" href="https://avatars.githubusercontent.com/u/64982545?v=4">

   <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --topbar-height: 48px;
        --window-radius: 20px;
        --glass-bg: rgba(255, 255, 255, 0.15);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        --focus-ring: 0 0 0 3px rgba(79, 172, 254, 0.35);

        --font-ui: 'Cantarell', 'Segoe UI', sans-serif;
        --font-mono: 'Monaco', 'Ubuntu Mono', 'Consolas', monospace;

        --text-xl: 2.5rem;
        --text-lg: 1.35rem;
        --text-md: 1.05rem;
        --text-base: 0.95rem;
        --text-sm: 0.82rem;
        --text-xs: 0.74rem;

        --lh-tight: 1.15;
        --lh-normal: 1.5;
        --lh-loose: 1.65;

        --tracking-tight: -0.02em;
        --tracking-normal: 0;
        --tracking-wide: 0.01em;

        --text-primary: rgba(255, 255, 255, 0.96);
        --text-secondary: rgba(255, 255, 255, 0.82);
        --text-muted: rgba(255, 255, 255, 0.68);
    }

    body {
        font-family: var(--font-ui);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        min-height: 100dvh;
        overflow: hidden;
        position: relative;
        color: var(--text-primary);
        user-select: none;
        line-height: var(--lh-normal);
        letter-spacing: var(--tracking-normal);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.3) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(255, 182, 193, 0.4) 0%, transparent 40%),
            radial-gradient(circle at 50% 50%, rgba(173, 216, 230, 0.3) 0%, transparent 50%);
        animation: glassFloat 12s ease-in-out infinite alternate;
        z-index: -1;
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
        z-index: -1;
        pointer-events: none;
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes glassFloat {
        0% { opacity: 0.8; transform: scale(1); }
        100% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes floatParticle {
        0%, 100% {
            transform: translateY(100vh) rotate(0deg);
            opacity: 0;
        }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% {
            transform: translateY(-100vh) rotate(720deg);
            opacity: 0;
        }
    }

    @keyframes windowGlow {
        0%, 100% {
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        50% {
            box-shadow:
                0 8px 40px rgba(100, 126, 234, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                0 0 60px rgba(102, 126, 234, 0.1);
        }
    }

    @keyframes iconPulse {
        0%, 100% { transform: scale(1.15) translateY(-5px); }
        50% { transform: scale(1.18) translateY(-7px); }
    }

    @keyframes rippleEffect {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

    @keyframes glassSlideIn {
        from { opacity: 0; transform: translateY(32px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(20px); }
    }

    .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .particle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: floatParticle 15s infinite ease-in-out;
    }

    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--topbar-height);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 13px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: var(--tracking-wide);
        z-index: 2000;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .activities,
    .status-icon,
    .dash-icon {
        appearance: none;
        border: none;
        background: transparent;
        color: inherit;
        font: inherit;
    }

    .activities {
        font-size: 14px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: var(--tracking-wide);
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .activities:hover,
    .status-icon:hover {
        background: rgba(255, 255, 255, 0.25);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .activities:focus-visible,
    .status-icon:focus-visible,
    .dash-icon:focus-visible,
    .control-btn:focus-visible,
    .app-item:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
    }

    .top-bar-right {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .status-icon {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .app-menu {
        position: absolute;
        top: 48px;
        left: 0;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border-radius: 16px;
        min-width: 240px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        z-index: 2001;
        max-height: 320px;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .app-menu.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .app-item {
        width: 100%;
        text-align: left;
        padding: 12px 20px;
        cursor: pointer;
        border: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: background 0.2s;
        font-size: var(--text-base);
        font-weight: 500;
        line-height: 1.35;
        letter-spacing: var(--tracking-normal);
        color: inherit;
        background: transparent;
    }

    .app-item:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    .dash {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border-radius: 20px;
        padding: 14px 20px;
        display: flex;
        gap: 14px;
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.25);
        z-index: 1500;
    }

    .dash-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .dash-icon:hover {
        transform: scale(1.15) translateY(-5px);
        background: rgba(255, 255, 255, 0.35);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        animation: iconPulse 0.6s ease-in-out;
    }

    .dash-icon:active {
        transform: scale(1.05) translateY(-2px);
    }

    .dash-icon.running {
        background: rgba(255, 255, 255, 0.28);
    }

    .dash-icon.active {
        background: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
    }

    .dash-icon::before {
        content: attr(data-label);
        position: absolute;
        bottom: -26px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: var(--tracking-wide);
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
    }

    .dash-icon:hover::before {
        opacity: 1;
    }

    .dash-icon::after {
        content: '';
        position: absolute;
        top: -4px;
        right: -4px;
        width: 8px;
        height: 8px;
        background: #4facfe;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .dash-icon.running::after {
        opacity: 1;
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        animation: rippleEffect 0.6s ease-out;
        pointer-events: none;
    }

    .window {
    position: fixed;
    top: 64px;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: var(--window-radius);
    box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    width: min(72vw, 960px);
    height: min(68vh, 720px);
    min-width: 360px;
    min-height: 340px;
    max-width: calc(100vw - 40px);
    max-height: calc(100dvh - 140px);
    z-index: 1000;
    animation: glassSlideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    border: 1px solid rgba(255, 255, 255, 0.25);
    resize: both;
    overflow: hidden;
}


    .window.focused {
        animation: windowGlow 3.5s ease-in-out infinite;
    }

    .window.hidden {
        display: none !important;
    }

    .title-bar {
        height: 48px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        padding: 0 20px;
        cursor: move;
        user-select: none;
        border-radius: var(--window-radius) var(--window-radius) 0 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .window-controls {
        display: flex;
        gap: 8px;
    }

    .control-btn {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
        border: none;
    }

    .close-gnome { background: #e01b26; }
    .minimize-gnome { background: #f5b041; }
    .maximize-gnome { background: #2fbe49; }

    .control-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 12px currentColor;
    }

    .window-title-gnome {
        flex: 1;
        margin-left: 16px;
        font-size: var(--text-base);
        font-weight: 600;
        line-height: var(--lh-tight);
        letter-spacing: var(--tracking-normal);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-primary);
    }

    .window-content {
    padding: 28px;
    height: calc(100% - 48px);
    overflow-y: auto;
    scroll-behavior: smooth;
    user-select: text;
    color: var(--text-secondary);
    font-size: var(--text-md);
    line-height: var(--lh-loose);

    display: flex;
    flex-direction: column;
}


    .window-content::-webkit-scrollbar {
        width: 8px;
    }

    .window-content::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
    }

    .window-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
    }

    .window-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
    }

    .hero-content {
        text-align: center;
    }

    .hero-name {
        font-size: var(--text-xl);
        line-height: 1.08;
        letter-spacing: var(--tracking-tight);
        background: linear-gradient(45deg, #1d99f3, #0d7ae5, #4facfe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
        font-weight: 700;
    }

    .hero-subtitle {
        font-size: 1.1rem;
        line-height: var(--lh-normal);
        color: var(--text-secondary);
        font-weight: 500;
        margin-bottom: 16px;
        letter-spacing: var(--tracking-normal);
    }

    .greeting {
        font-size: var(--text-lg);
        line-height: 1.4;
        color: #4facfe;
        margin-top: 16px;
        text-shadow: 0 0 12px rgba(79, 172, 254, 0.4);
        font-weight: 600;
        letter-spacing: var(--tracking-tight);
    }

    .window-body-text {
        font-size: var(--text-md);
        line-height: var(--lh-loose);
        color: var(--text-secondary);
        letter-spacing: var(--tracking-normal);
    }

    .info-list {
        list-style: none;
    }

    .info-list li {
        padding: 16px 20px;
        margin: 12px 0;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        font-size: var(--text-md);
        line-height: var(--lh-loose);
        color: var(--text-secondary);
        letter-spacing: var(--tracking-wide);
    }

    .info-list li strong {
        color: var(--text-primary);
        font-weight: 600;
    }

    .info-list li:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .terminal-shell {
    font-family: var(--font-mono);
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 16px;
    border-radius: 12px;
    height: 100%;
    min-height: 320px;
    overflow-y: auto;
    position: relative;
    font-size: 14px;
    line-height: 1.6;
    flex: 1;
    min-width: 0;
}



    .terminal-controls {
        position: absolute;
        top: 8px;
        right: 12px;
        display: flex;
        gap: 6px;
    }

    .terminal-controls div {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    .terminal-output {
        font-size: 14px;
        line-height: 1.6;
        margin-top: 8px;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .terminal-input-line {
        display: flex;
        align-items: center;
        margin-top: 4px;
    }

    .terminal-prompt {
        color: #89b4fa;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
    }

    #terminal-input {
        background: transparent;
        border: none;
        color: #cdd6f4;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.6;
        flex: 1;
        outline: none;
        caret-color: #f5c2e7;
        user-select: text;
    }

    .notification {
        position: fixed;
        bottom: 80px;
        right: 20px;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: var(--text-base);
        font-weight: 500;
        line-height: 1.35;
        z-index: 3000;
        animation: slideIn 0.3s ease-out;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .notification.warning {
        background: rgba(245, 158, 11, 0.9);
    }

    .mono-block {
        font-family: var(--font-mono);
        white-space: pre-wrap;
        font-size: 14px;
        line-height: 1.6;
    }

    @media (max-width: 768px) {
        :root {
            --text-xl: 2.15rem;
            --text-lg: 1.2rem;
            --text-md: 1rem;
            --text-base: 0.92rem;
            --text-sm: 0.8rem;
            --text-xs: 0.72rem;
        }

        .dash {
            bottom: 16px;
            left: 16px;
            right: 16px;
            transform: none;
            padding: 10px;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .dash-icon {
            width: 56px;
            height: 56px;
        }

        .top-bar {
            font-size: 12px;
            padding: 0 12px;
        }

        .activities {
            font-size: 13px;
        }

        .window {
            min-width: 0;
            width: calc(100vw - 20px) !important;
            max-width: calc(100vw - 20px);
            left: 10px !important;
            top: 58px !important;
            max-height: calc(100dvh - 140px);
        }

        .window-content {
            padding: 22px;
        }

        .dash-icon::before {
            font-size: 11px;
        }
    }
    @media (min-width: 1440px) {
    .window {
        width: min(70vw, 1100px);
        height: min(72vh, 820px);
    }

    .window-content {
        padding: 32px;
    }

    .hero-name {
        font-size: 3rem;
    }

    .info-list li {
        font-size: 1.08rem;
    }
}

</style>

</head>
<body>
    <div class="particles" id="particles" aria-hidden="true"></div>

    <div class="top-bar">
        <button class="activities" id="activities" aria-label="Activities">Activities</button>
        <div style="flex: 1;"></div>
        <div class="top-bar-right">
            <button class="status-icon" title="Network" aria-label="Network">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
            </button>
            <button class="status-icon" title="Volume" aria-label="Volume">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <button class="status-icon" id="appSwitcher" title="Apps" aria-label="Open apps">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="5" r="1"/><circle cx="19" cy="5" r="1"/><circle cx="5" cy="19" r="1"/><circle cx="19" cy="19" r="1"/></svg>
            </button>
            <button class="status-icon" title="Battery" aria-label="Battery">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/><rect x="3" y="8" width="12" height="8" fill="currentColor" opacity="0.5"/></svg>
            </button>
            <div id="statusClock" style="color: #fff; font-weight: bold; font-size: 14px;" aria-live="polite">--:--</div>
        </div>
    </div>

    <div class="dash" id="dash" role="toolbar" aria-label="Applications">
        <button class="dash-icon" data-window="firefox" data-label="Firefox" title="Firefox" aria-label="Open Firefox">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12a4 4 0 0 1 8 0"/><path d="M12 8v4l2 2"/></svg>
        </button>
        <button class="dash-icon" data-window="terminal" data-label="Terminal" title="Terminal" aria-label="Open Terminal">

    <script>
        const DEFAULT_USER_DATA = {
            name: 'OOM or OM',

        let userData = null;

        let topZIndex = 1001;

        const windowManager = new Map();

        const terminalState = {
            history: [],
            historyIndex: -1,
            sudoMode: false,
            pingIntervals: new Map(),

        function escapeHtml(value = '') {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function createElement(tag, className, text) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (text !== undefined) el.textContent = text;
            return el;
        }

        function showNotification(message, type = 'warning') {
            const notification = createElement('div', `notification ${type}`);
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out forwards';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = createElement('div', 'particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 15 + 5) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }

        function createRipple(event, element) {
            const ripple = createElement('span', 'ripple');
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);

            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = event.clientX - rect.left - size / 2 + 'px';
            ripple.style.top = event.clientY - rect.top - size / 2 + 'px';

            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function sanitizeUserData(data) {
            return {
                name: data?.name || DEFAULT_USER_DATA.name,
                pronouns: data?.pronouns || DEFAULT_USER_DATA.pronouns,
                birthday: data?.birthday || DEFAULT_USER_DATA.birthday,
                likes: Array.isArray(data?.likes) && data.likes.length ? data.likes.map(String) : DEFAULT_USER_DATA.likes,
                dislike: data?.dislike || DEFAULT_USER_DATA.dislike,
                languages: {
                    thai: data?.languages?.thai || DEFAULT_USER_DATA.languages.thai,
                    english: data?.languages?.english || DEFAULT_USER_DATA.languages.english,
                    note: data?.languages?.note || DEFAULT_USER_DATA.languages.note
                },
                games: data?.games || DEFAULT_USER_DATA.games,
                animals: data?.animals || DEFAULT_USER_DATA.animals,
                greeting: data?.greeting || DEFAULT_USER_DATA.greeting
            };
        }

        async function loadUserData() {
            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                userData = sanitizeUserData(json);
            } catch (error) {
                console.warn('Failed to load data.json, using defaults:', error);
                userData = DEFAULT_USER_DATA;
                showNotification('⚠️ Using default data (data.json not found)');

                        <span class="terminal-prompt">[oom@linux ~]$ </span>
                        <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" />
                    </div>

        }

},
        terminal: {
    title: 'Terminal',
    render(container) {
        const wrap = createElement('div');
        wrap.style.cssText = `
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 0;
        `;

        wrap.innerHTML = renderTerminalMarkup();

    }
},

        birthday: {
            title: '🕊️ Birthday',
            render(container) {
                const p = createElement('p', 'window-body-text');

        likes: {
            title: '🐇 Likes',
            render(container) {

            render(container) {
                const ul = createElement('ul', 'info-list');

                const liThai = createElement('li');
                liThai.innerHTML = `<span style="font-size: 1.15em; margin-right: 12px;">🇹🇭 Thai</span><strong>${escapeHtml(data.languages.thai)}</strong>`;

                const liEnglish = createElement('li');
                liEnglish.innerHTML = `<span style="font-size: 1.15em; margin-right: 12px;">🇺🇸 English</span><strong>${escapeHtml(data.languages.english)}</strong>`;

                const liNote = createElement('li');
                liNote.style.textAlign = 'center';

                ul.append(liThai, liEnglish, liNote);

}


        function setDockState(windowId, { running, active }) {
            const icon = document.querySelector(`.dash-icon[data-window="${windowId}"]`);
            if (!icon) return;
            icon.classList.toggle('running', !!running);
            icon.classList.toggle('active', !!active);
        }

        function refreshDockStates() {
            document.querySelectorAll('.dash-icon').forEach(icon => {
                const id = icon.dataset.window;
                const win = windowManager.get(id);
                const running = !!win;
                const active = running && activeWindowId === id && !win.hidden;
                setDockState(id, { running, active });
            });
        }

        function clampWindowPosition(element) {
            const rect = element.getBoundingClientRect();
            const maxLeft = Math.max(0, window.innerWidth - rect.width);
            const maxTop = Math.max(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--topbar-height')) + 4, 0);
            const bottomLimit = Math.max(maxTop, window.innerHeight - 80 - rect.height);

            let left = parseFloat(element.style.left) || rect.left;
            let top = parseFloat(element.style.top) || rect.top;

            left = Math.max(0, Math.min(left, maxLeft));
            top = Math.max(maxTop, Math.min(top, bottomLimit));

            element.style.left = left + 'px';
            element.style.top = top + 'px';
        }

        class GnomeWindow {
            constructor(id) {
                this.id = id;
                this.element = null;
                this.hidden = false;
                this.maximized = false;
                this.restoreState = null;
                this.create();
            }

            create() {
    const meta = windowsData[this.id];
    if (!meta) return;

    this.element = createElement('div', 'window');
    this.element.dataset.windowId = this.id;

    const topbar = parseInt(
        getComputedStyle(document.documentElement).getPropertyValue('--topbar-height')
    ) || 48;

    const safeBottom = 100;

    const width = Math.min(window.innerWidth * 0.72, 960);
    const height = Math.min(
        window.innerHeight * 0.68,
        window.innerHeight - topbar - safeBottom
    );

    const left = Math.max((window.innerWidth - width) / 2, 20);
    const top = Math.max((window.innerHeight - height) / 2, topbar + 16);

    this.element.style.width = `${width}px`;
    this.element.style.height = `${height}px`;
    this.element.style.left = `${left}px`;
    this.element.style.top = `${top}px`;
    this.element.style.zIndex = ++topZIndex;

    const titleBar = createElement('div', 'title-bar');

    const controls = createElement('div', 'window-controls');

    const closeBtn = createElement('button', 'control-btn close-gnome');
    closeBtn.type = 'button';
    closeBtn.title = 'Close';
    closeBtn.setAttribute('aria-label', 'Close window');

    const minBtn = createElement('button', 'control-btn minimize-gnome');
    minBtn.type = 'button';
    minBtn.title = 'Minimize';
    minBtn.setAttribute('aria-label', 'Minimize window');

    const maxBtn = createElement('button', 'control-btn maximize-gnome');
    maxBtn.type = 'button';
    maxBtn.title = 'Maximize';
    maxBtn.setAttribute('aria-label', 'Maximize window');

    controls.append(closeBtn, minBtn, maxBtn);

    const title = createElement('div', 'window-title-gnome', meta.title);
    const content = createElement('div', 'window-content');

    meta.render(content);

    titleBar.append(controls, title);
    this.element.append(titleBar, content);
    document.body.appendChild(this.element);

    closeBtn.addEventListener('click', () => this.close());
    minBtn.addEventListener('click', () => this.minimize());
    maxBtn.addEventListener('click', () => this.toggleMaximize());

    this.element.addEventListener('mousedown', () => this.bringToFront());
    this.element.addEventListener('pointerdown', () => this.bringToFront());
}


            bringToFront() {
                activeWindowId = this.id;
                this.element.style.zIndex = ++topZIndex;

                document.querySelectorAll('.window').forEach(win => {
                    win.classList.remove('focused');
                });

                this.element.classList.add('focused');
                refreshDockStates();
            }

            show() {
                this.hidden = false;
                this.element.classList.remove('hidden');
                this.element.style.display = 'block';
                this.bringToFront();

                if (this.id === 'terminal') {
                    setTimeout(() => initTerminal(), 50);
                }
            }

            minimize() {
                this.hidden = true;
                this.element.classList.add('hidden');
                if (activeWindowId === this.id) {
                    activeWindowId = null;
                }
                this.element.classList.remove('focused');
                refreshDockStates();
            }

            toggleMaximize() {
    if (!this.maximized) {
        this.restoreState = {
            left: this.element.style.left,
            top: this.element.style.top,
            width: this.element.style.width,
            height: this.element.style.height,
            maxWidth: this.element.style.maxWidth,
            maxHeight: this.element.style.maxHeight
        };

        const topbar = parseInt(
            getComputedStyle(document.documentElement).getPropertyValue('--topbar-height')
        ) || 48;

        this.element.style.left = '20px';
        this.element.style.top = `${topbar + 16}px`;
        this.element.style.width = 'calc(100vw - 40px)';
        this.element.style.height = `calc(100dvh - ${topbar + 110}px)`;
        this.element.style.maxWidth = 'none';
        this.element.style.maxHeight = 'none';
        this.maximized = true;
    } else {
        const s = this.restoreState || {};
        this.element.style.left = s.left || '20px';
        this.element.style.top = s.top || '64px';
        this.element.style.width = s.width || '';
        this.element.style.height = s.height || '';
        this.element.style.maxWidth = s.maxWidth || '';
        this.element.style.maxHeight = s.maxHeight || '';
        this.maximized = false;
    }

    this.bringToFront();
    clampWindowPosition(this.element);
}


            close() {
                this.element.remove();
                windowManager.delete(this.id);
                if (activeWindowId === this.id) activeWindowId = null;
                refreshDockStates();
                updateAppMenu();
            }
        }

        function updateClock() {
            const clockEl = document.getElementById('statusClock');
            if (!clockEl) return;

            clockEl.textContent = new Date().toLocaleTimeString('th-TH', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function scheduleClock() {
            updateClock();
            const now = new Date();
            const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            setTimeout(() => {
                updateClock();
                setInterval(updateClock, 60000);
            }, msUntilNextMinute);
        }

        function updateAppMenu() {
            const appMenu = document.getElementById('appMenu');
            appMenu.innerHTML = '';

            const windows = Array.from(windowManager.values());
            if (!windows.length) {
                const item = createElement('button', 'app-item', 'No open apps');
                item.type = 'button';
                item.disabled = true;
                appMenu.appendChild(item);
                return;
            }

            windows
                .sort((a, b) => (parseInt(b.element.style.zIndex) || 0) - (parseInt(a.element.style.zIndex) || 0))
                .forEach(win => {
                    const item = createElement('button', 'app-item');
                    item.type = 'button';
                    item.textContent = win.element.querySelector('.window-title-gnome').textContent + (win.hidden ? ' (minimized)' : '');
                    item.addEventListener('click', () => {
                        win.show();
                        document.getElementById('appMenu').classList.remove('show');
                    });
                    appMenu.appendChild(item);
                });
        }
        
        async function appendTerminalLines(output, cmd, lines) {
    const cmdLine = document.createElement('div');

    const prompt = document.createElement('span');
    prompt.style.cssText = 'color: #89b4fa;';
    prompt.textContent = '[oom@linux ~]$ ';

    const cmdText = document.createElement('span');
    cmdText.style.cssText = 'color: #f5c2e7;';
    cmdText.textContent = cmd;

    cmdLine.append(prompt, cmdText);
    output.appendChild(cmdLine);

    for (const line of lines) {
        const lineDiv = document.createElement('div');
        lineDiv.textContent = line;
        output.appendChild(lineDiv);
        output.scrollTop = output.scrollHeight;

        // 👇 smart delay
        let delay = Math.random() * 120 + 60; // ปกติ 40–160ms

        // ถ้าเป็น download → ช้าหน่อย
        if (line.startsWith('Get:') || line.includes('Fetched')) {
            delay = Math.random() * 400 + 2000; // 200–600ms
        }

        // ถ้าเป็น step ใหญ่ → pause นิด
        if (line.includes('Reading') || line.includes('Building')) {
            delay = Math.random() * 300 + 150;
        }

        await new Promise(r => setTimeout(r, delay));
    }

    output.appendChild(document.createElement('br'));
}

        function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function appendTerminalLines(output, cmd, lines) {
    const cmdLine = document.createElement('div');
    cmdLine.style.lineHeight = '1.6';

    const prompt = document.createElement('span');
    prompt.style.cssText = 'color: #89b4fa; font-size: 14px;';
    prompt.textContent = '[oom@linux ~]$ ';

    const cmdText = document.createElement('span');
    cmdText.style.cssText = 'color: #f5c2e7; font-size: 14px;';
    cmdText.textContent = cmd;

    cmdLine.append(prompt, cmdText);
    output.appendChild(cmdLine);

    for (const line of lines) {
        const lineDiv = document.createElement('div');
        lineDiv.style.cssText = 'line-height: 1.6; font-size: 14px; white-space: pre-wrap;';
        lineDiv.textContent = line;
        output.appendChild(lineDiv);
        output.scrollTop = output.scrollHeight;

        let delay = Math.random() * 120 + 40;

        if (line.startsWith('Get:') || line.includes('Fetched')) {
            delay = Math.random() * 400 + 200;
        }

        if (line.includes('Reading') || line.includes('Building') || line.includes('Calculating')) {
            delay = Math.random() * 280 + 120;
        }

        await sleep(delay);
    }

    output.appendChild(document.createElement('br'));
    output.scrollTop = output.scrollHeight;
}

function appendLiveLine(output, text, color = '#cdd6f4') {
    const line = document.createElement('div');
    line.style.cssText = `line-height: 1.6; font-size: 14px; white-space: pre-wrap; color: ${color};`;
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
    return line;
}

function stopHtop() {
    if (terminalState.htopInterval) {
        clearInterval(terminalState.htopInterval);
        terminalState.htopInterval = null;
    }
}

function stopAllPing() {
    terminalState.pingIntervals.forEach(intervalId => clearInterval(intervalId));
    terminalState.pingIntervals.clear();
}

function generateHtopFrame() {
    const cpu = randomInt(18, 87);
    const ram = randomInt(34, 76);
    const swap = randomInt(1, 18);
    const tasks = randomInt(184, 241);
    const running = randomInt(2, 9);
    const load1 = (Math.random() * 2.5 + 0.2).toFixed(2);
    const load5 = (Math.random() * 2.2 + 0.2).toFixed(2);
    const load15 = (Math.random() * 2.0 + 0.2).toFixed(2);

    function bar(percent, size = 20) {
        const filled = Math.round((percent / 100) * size);
        return '█'.repeat(filled) + '░'.repeat(size - filled);
    }

    return `
htop - oom@linux
Tasks: ${tasks}, ${running} running
Load average: ${load1} ${load5} ${load15}

CPU  [${bar(cpu)}] ${cpu}%
MEM  [${bar(ram)}] ${ram}%

        function appendTerminalEntry(output, cmd, result) {
    const cmdLine = document.createElement('div');
    cmdLine.style.lineHeight = '1.6';

    const prompt = document.createElement('span');
    prompt.style.cssText = 'color: #89b4fa; font-size: 14px;';
    prompt.textContent = '[oom@linux ~]$ ';

    const cmdText = document.createElement('span');
    cmdText.style.cssText = 'color: #f5c2e7; font-size: 14px;';
    cmdText.textContent = cmd;

    cmdLine.append(prompt, cmdText);
    output.appendChild(cmdLine);

    if (result.type === 'html') {
        const htmlWrap = document.createElement('div');
        htmlWrap.style.cssText = 'line-height: 1.6; font-size: 14px;';
        htmlWrap.innerHTML = result.value;
        output.appendChild(htmlWrap);
    } else if (result.type === 'text') {
        const textWrap = document.createElement('div');
        textWrap.style.cssText = 'line-height: 1.6; font-size: 14px; white-space: pre-wrap;';
        textWrap.textContent = result.value;
        output.appendChild(textWrap);
    }

    output.appendChild(document.createElement('br'));
    output.scrollTop = output.scrollHeight;
}

       function initTerminal() {
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('terminal-input');
    if (!output || !input) return;

    if (!output.dataset.booted) {
        output.innerHTML = `<span style="color: #a6e3a1;">Welcome to GNOME Terminal!</span><br>Type 'help' for available commands.<br><br>`;
        output.dataset.booted = 'true';
    }

    if (!input.dataset.bound) {
        input.addEventListener('keydown', async (event) => {
            if (event.key === 'Enter') {
                stopHtop();

                const cmd = input.value.trim();
                if (!cmd) return;

                terminalState.history.push(cmd);
                terminalState.historyIndex = terminalState.history.length;

                const parts = cmd.split(/\s+/);
                const command = parts[0].toLowerCase();
                const args = parts.slice(1);

                let result;
                if (terminalCommands[command]) {
                    result = terminalCommands[command](args);
                } else {
                    result = {
                        type: 'text',
                        value: `Command not found: ${command}\nType 'help' for available commands.`
                    };
                }

                input.value = '';

                if (result.type === 'clear') {
    output.innerHTML = '';
    output.dataset.booted = 'true';
} else if (result.type === 'exit') {
    appendTerminalEntry(output, cmd, {
        type: 'text',
        value: 'logout'
    });

    const terminalWindow = windowManager.get('terminal');
    if (terminalWindow) {
        setTimeout(() => {
            terminalWindow.close();
        }, 250);
    }
} else if (result.type === 'lines') {
    await appendTerminalLines(output, cmd, result.lines);
} else if (result.type === 'ping') {

                    appendTerminalEntry(output, cmd, {
                        type: 'text',
                        value: `PING ${result.host} (${result.host}) 56(84) bytes of data.`
                    });

                    let seq = 1;
                    const intervalId = setInterval(() => {
                        const time = (Math.random() * 40 + 12).toFixed(1);
                        appendLiveLine(
                            output,
                            `64 bytes from ${result.host}: icmp_seq=${seq++} ttl=117 time=${time} ms`
                        );
                    }, randomInt(700, 1200));

                    terminalState.pingIntervals.set(result.host + Date.now(), intervalId);
                } else if (result.type === 'htop') {
                    

                    const frame = appendLiveLine(output, generateHtopFrame(), '#a6e3a1');
                    frame.style.fontFamily = 'var(--font-mono)';
                    frame.style.whiteSpace = 'pre-wrap';

                    terminalState.htopInterval = setInterval(() => {
                        frame.textContent = generateHtopFrame();
                        output.scrollTop = output.scrollHeight;
                    }, 900);
                } else {
                    appendTerminalEntry(output, cmd, result);
                }

                output.scrollTop = output.scrollHeight;
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (terminalState.historyIndex > 0) {
                    terminalState.historyIndex--;
                    input.value = terminalState.history[terminalState.historyIndex];
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (terminalState.historyIndex < terminalState.history.length - 1) {
                    terminalState.historyIndex++;
                    input.value = terminalState.history[terminalState.historyIndex];
                } else {
                    terminalState.historyIndex = terminalState.history.length;
                    input.value = '';
                }
            }
        });

        input.dataset.bound = 'true';
    }

    input.focus();
}

        async function appendTerminalLines(output, cmd, lines, delay = 150) {
            const cmdLine = document.createElement('div');
            cmdLine.style.lineHeight = '1.6';

            const prompt = document.createElement('span');
            prompt.style.cssText = 'color: #89b4fa; font-size: 14px;';
            prompt.textContent = '[oom@linux ~]$ ';

            const cmdText = document.createElement('span');
            cmdText.style.cssText = 'color: #f5c2e7; font-size: 14px;';
            cmdText.textContent = cmd;

            cmdLine.append(prompt, cmdText);
            output.appendChild(cmdLine);

    for (const line of lines) {
        const lineDiv = document.createElement('div');
        lineDiv.style.cssText = 'line-height: 1.6; font-size: 14px; white-space: pre-wrap;';
        lineDiv.textContent = line;
        output.appendChild(lineDiv);
        output.scrollTop = output.scrollHeight;

        const randomDelay = Math.floor(Math.random() * 2000) + 50; // 50–250ms
        await new Promise(resolve => setTimeout(resolve, randomDelay));

    }

    output.appendChild(document.createElement('br'));
    output.scrollTop = output.scrollHeight;
}



   

        function openOrToggleWindow(windowId) {
    let win = windowManager.get(windowId);

    // นับจำนวนหน้าต่างที่เปิดอยู่
    const openWindows = Array.from(windowManager.values()).filter(w => !w.hidden);

    if (!win) {
        if (openWindows.length >= 3) {
            showNotification('⚠️ You can only have 3 windows open at a time!');
            return;
        }

        win = new GnomeWindow(windowId);
        windowManager.set(windowId, win);
        win.show();
        updateAppMenu();
        return;
    }

    if (win.hidden) {
        if (openWindows.length >= 3) {
            showNotification('⚠️ You can only have 3 windows open at a time!');
            return;
        }
        win.show();
    } else if (activeWindowId === windowId) {
        win.minimize();
    } else {
        win.show();
    }

    updateAppMenu();
}

        function initAppSwitcher() {
            const appSwitcher = document.getElementById('appSwitcher');
            const appMenu = document.getElementById('appMenu');

            appSwitcher.addEventListener('click', event => {
                event.stopPropagation();
                appMenu.classList.toggle('show');
                updateAppMenu();
            });

            document.addEventListener('click', event => {
                if (!appMenu.contains(event.target) && event.target !== appSwitcher) {
                    appMenu.classList.remove('show');
                }
            });
        }

        function initDash() {
            const dash = document.getElementById('dash');

            dash.addEventListener('click', event => {
                const button = event.target.closest('.dash-icon');
                if (!button) return;
                createRipple(event, button);
                openOrToggleWindow(button.dataset.window);
            });
        }

        function initWindowDragging() {
            let dragState = null;

            document.addEventListener('pointerdown', event => {
                const titleBar = event.target.closest('.title-bar');
                if (!titleBar || event.target.closest('.control-btn')) return;

                const winEl = titleBar.closest('.window');
                if (!winEl) return;

                const windowId = winEl.dataset.windowId;
                const win = windowManager.get(windowId);
                if (!win || win.maximized) return;

                const rect = winEl.getBoundingClientRect();
                dragState = {
                    win,
                    offsetX: event.clientX - rect.left,
                    offsetY: event.clientY - rect.top
                };

                win.bringToFront();
                titleBar.setPointerCapture?.(event.pointerId);
            });

            document.addEventListener('pointermove', event => {
                if (!dragState) return;

                const el = dragState.win.element;
                let nextLeft = event.clientX - dragState.offsetX;
                let nextTop = event.clientY - dragState.offsetY;

                const rect = el.getBoundingClientRect();
                const maxLeft = window.innerWidth - rect.width;
                const minTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--topbar-height')) + 4;
                const maxTop = window.innerHeight - 90 - rect.height;

                nextLeft = Math.max(0, Math.min(nextLeft, Math.max(0, maxLeft)));
                nextTop = Math.max(minTop, Math.min(nextTop, Math.max(minTop, maxTop)));

                el.style.left = nextLeft + 'px';
                el.style.top = nextTop + 'px';
            });

            document.addEventListener('pointerup', () => {
                dragState = null;
            });

            window.addEventListener('resize', () => {
                windowManager.forEach(win => clampWindowPosition(win.element));
            });
        }

        async function init() {
            createParticles();
            await loadUserData();
            initDash();
            initAppSwitcher();
            initWindowDragging();
            scheduleClock();

            document.getElementById('activities').addEventListener('click', () => {
                const anyVisible = Array.from(windowManager.values()).some(win => !win.hidden);
                if (!anyVisible) {
                    openOrToggleWindow('profile');
                } else {
                    updateAppMenu();
                    document.getElementById('appMenu').classList.toggle('show');
                }
            });
        }

        init();
