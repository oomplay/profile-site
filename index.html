<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOM's GNOME 45 Desktop 🐧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cantarell', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #fff;
            user-select: none;
        }

        /* Glass Desktop Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 182, 193, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(173, 216, 230, 0.3) 0%, transparent 50%);
            animation: glassFloat 12s ease-in-out infinite alternate;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glassFloat {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: floatParticle 15s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(100vh) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(-100vh) rotate(720deg); 
                opacity: 0;
            }
        }

        /* Glowing effect for active windows */
        @keyframes windowGlow {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.3); }
            50% { box-shadow: 0 8px 40px rgba(100, 126, 234, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 0 60px rgba(102, 126, 234, 0.1); }
        }

        /* Pulse animation for dock icons */
        @keyframes iconPulse {
            0%, 100% { transform: scale(1.15) translateY(-5px); }
            50% { transform: scale(1.18) translateY(-7px); }
        }

        .dash-icon:hover {
            animation: iconPulse 0.6s ease-in-out;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Glass Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .activities {
            font-size: 15px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .activities:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .top-bar-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .app-menu {
            position: absolute;
            top: 48px;
            left: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 16px;
            min-width: 240px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 2001;
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .app-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .app-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
            font-size: 14px;
        }

        .app-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Glass Dock */
        .dash {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            gap: 14px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .dash-icon {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .dash-icon:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .dash-icon.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        /* Dock icon labels */
        .dash-icon::before {
            content: attr(data-label);
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .dash-icon:hover::before {
            opacity: 1;
        }

        /* Click ripple animation */
        @keyframes clickRipple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        .dash-icon:active {
            transform: scale(1.05) translateY(-2px);
        }

        /* Glass Windows */
        .window {
            position: fixed;
            top: 64px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 20px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            min-width: 360px;
            max-width: 600px;
            max-height: 70vh;
            z-index: 1000;
            animation: glassSlideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            resize: both;
            min-height: 340px;
        }

        @keyframes glassSlideIn {
            from { opacity: 0; transform: translateY(32px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .title-bar {
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            cursor: move;
            user-select: none;
            border-radius: 20px 20px 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .close-gnome { background: #e01b26; }
        .minimize-gnome { background: #f5b041; }
        .maximize-gnome { background: #2fbe49; }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px currentColor;
        }

        .window-title-gnome {
            flex: 1;
            margin-left: 16px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .window-content {
            padding: 28px;
            height: calc(100% - 48px);
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        .window-content::-webkit-scrollbar {
            width: 8px;
        }

        .window-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .window-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .window-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .hero-content { text-align: center; }
        .hero-name {
            font-size: 2.6rem;
            background: linear-gradient(45deg, #1d99f3, #0d7ae5, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .greeting {
            font-size: 1.6rem;
            color: #4facfe;
            margin-top: 20px;
            text-shadow: 0 0 12px rgba(79, 172, 254, 0.4);
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            padding: 16px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .info-list li:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 768px) {
            .dash { 
                bottom: 16px; 
                left: 16px; 
                right: 16px; 
                padding: 10px; 
                flex-wrap: wrap; 
                gap: 10px; 
            }
            .dash-icon { width: 56px; height: 56px; }
            .top-bar { font-size: 13px; padding: 0 12px; }
        }

        .dash-icon::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 8px;
            height: 8px;
            background: #4facfe;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .dash-icon.running::after { opacity: 1; }

        /* Terminal input fix */
        #terminal-input {
            user-select: text !important;
            pointer-events: auto !important;
        }
    </style>
</head>

    <script>
        let windowsData = {};
        let userData = null;

        async function loadUserData() {
            try {
                const response = await fetch('data.json');
                userData = await response.json();
                buildWindowsData();
            } catch (e) {
                console.log('Failed to load data.json, using defaults');
                buildWindowsData(true);
            }
        }

        function buildWindowsData(useDefaults = false) {
            const data = useDefaults ? {
                name: 'OOM or OM',
                pronouns: 'He/Him',
                birthday: 'Nahh',
                likes: ['Reading', 'Watching Vtuber', 'Sleeping', 'Listening to music', 'Code!'],
                dislike: 'Nahh (ask me 😌)',
                languages: { thai: 'Native Proficiency (maybe)', english: 'Intermediate Proficiency (B2)', note: 'B2 is in actual use ≠ B2 Examination trust me...' },
                games: 'Minecraft......',
                animals: 'Fox and other cute animals!',
                greeting: 'Nice to meet everyone!'
            } : userData;

            windowsData.profile = {
                title: 'About ' + data.name.split(' ')[0],
                content: `<div class="hero-content">
                    <div class="hero-name">${data.name}</div>
                    <div style="font-size: 1.4rem; color: rgba(255,255,255,0.9); margin-bottom: 20px;">🍜 ${data.pronouns}</div>
                    <div class="greeting">🎋 ${data.greeting}</div>
                </div>`
            };
            windowsData.firefox = {
                title: 'Firefox 🦊',
                content: `<div style="padding: 40px; text-align: center;">
                    <h2 style="color: #e66000; font-size: 2rem; margin-bottom: 20px;">🦊 Firefox</h2>
                    <iframe src="https://archive.org/details/Rick_Astley_Never_Gonna_Give_You_Up"

                    <p style="margin-top: 20px; opacity: 0.8;">\🎵~~~>
                </div>`
            };
            windowsData.terminal = {
                title: 'Terminal',
                content: `<div id="terminal-container" style="font-family: 'Monaco', 'Ubuntu Mono', 'Consolas', monospace; background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 12px; height: 380px; overflow-y: auto; position: relative;">

                        <div style="width: 12px; height: 12px; background: #a6e3a1; border-radius: 50%;"></div>
                    </div>
                    <div id="terminal-output" style="font-size: 14px; line-height: 1.6; margin-top: 8px;"></div>
                    <div id="terminal-input-line" style="display: flex; align-items: center; margin-top: 4px;">
                        <span id="terminal-prompt" style="color: #89b4fa; font-size: 14px; white-space: nowrap;">[oom@linux ~]$ </span>
                        <input type="text" id="terminal-input" style="background: transparent; border: none; color: #cdd6f4; font-family: inherit; font-size: 14px; flex: 1; outline: none; caret-color: #f5c2e7;" autocomplete="off" spellcheck="false">
                    </div>
                </div>`
            };
            windowsData.birthday = {
                title: '🕊️ Birthday',
                content: `<p style="font-size: 1.4rem; color: rgba(255,255,255,0.9);">${data.birthday}</p>`
            };
            windowsData.likes = {
                title: '🐇 Likes',
                content: `<ul class="info-list">${data.likes.map(item => `<li>📚 ${item}</li>`).join('')}</ul>`
            };
            windowsData.dislikes = {
                title: '🥐 Dislike',
                content: `<p style="font-size: 1.4rem; color: rgba(255,255,255,0.9);">${data.dislike}</p>`
            };
            windowsData.languages = {
                title: '🧁 Languages',
                content: `<ul class="info-list">
                    <li><span style="font-size: 1.3rem; margin-right: 12px;">🇹🇭 Thai</span><strong>${data.languages.thai}</strong></li>
                    <li><span style="font-size: 1.3rem; margin-right: 12px;">🇺🇸 English</span><strong>${data.languages.english}</strong></li>
                    <li style="text-align: center;">😌 ${data.languages.note}</li>
                </ul>`
            };
            windowsData.games = {
                title: '🍡 Games',
                content: `<p style="font-size: 1.4rem; color: rgba(255,255,255,0.9);">${data.games}</p>`
            };

        let windowManager = [];

        class GnomeWindow {
            constructor(id) {
                this.id = id;
                this.element = null;
                this.create();
            }

            create() {
                this.element = document.createElement('div');
                this.element.className = 'window';
                this.element.style.display = 'none';
                this.element.style.left = '60px';
                this.element.style.top = '80px';
                this.element.style.zIndex = 1001;

                const titleBar = document.createElement('div');
                titleBar.className = 'title-bar';

                const controls = document.createElement('div');
                controls.className = 'window-controls';
                controls.innerHTML = `
                    <div class="control-btn close-gnome" title="Close"></div>
                    <div class="control-btn minimize-gnome" title="Minimize"></div>
                    <div class="control-btn maximize-gnome" title="Maximize"></div>
                `;

                const title = document.createElement('div');
                title.className = 'window-title-gnome';
                title.textContent = windowsData[this.id].title;

                titleBar.appendChild(controls);
                titleBar.appendChild(title);

                const content = document.createElement('div');
                content.className = 'window-content';
                content.innerHTML = windowsData[this.id].content;

                this.element.appendChild(titleBar);
                this.element.appendChild(content);

                document.body.appendChild(this.element);
                this.bindEvents();
            }

            bindEvents() {
                // Drag
                let isDragging = false;
                let xOffset = 0;
                let yOffset = 0;

                const titleBar = this.element.querySelector('.title-bar');
                titleBar.addEventListener('mousedown', (e) => {
                    if (e.target.closest('.control-btn')) return;
                    isDragging = true;
                    xOffset = e.clientX - parseInt(this.element.style.left || 0);
                    yOffset = e.clientY - parseInt(this.element.style.top || 0);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        this.element.style.left = (e.clientX - xOffset) + 'px';
                        this.element.style.top = (e.clientY - yOffset) + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                // Controls
                this.element.querySelector('.close-gnome').onclick = () => this.close();
                this.element.querySelector('.minimize-gnome').onclick = () => this.minimize();
                this.element.querySelector('.maximize-gnome').onclick = () => this.toggleMaximize();
            }

            show() {
                this.element.style.display = 'block';
                this.bringToFront();
                // Initialize terminal when showing terminal window
                if (this.id === 'terminal') {
                    setTimeout(() => {
                        initTerminal();
                        // Focus the input field
                        const input = document.getElementById('terminal-input');
                        if (input) input.focus();
                    }, 50);
                }
            }

            minimize() {
                this.element.style.display = 'none';
                document.querySelector(`[data-window="${this.id}"]`).classList.add('active');
            }

            toggleMaximize() {
                if (this.element.style.width === '90vw') {
                    this.element.style.width = '';
                    this.element.style.height = '';
                    this.element.style.left = '60px';
                    this.element.style.top = '80px';
                } else {
                    this.element.style.left = '5vw';
                    this.element.style.top = '10vh';
                    this.element.style.width = '90vw';
                    this.element.style.height = '80vh';
                    this.element.style.maxWidth = 'none';
                    this.element.style.maxHeight = 'none';
                }
                this.bringToFront();
            }

            close() {
                this.element.remove();
                const index = windowManager.indexOf(this);
                if (index > -1) windowManager.splice(index, 1);
                document.querySelector(`[data-window="${this.id}"]`).classList.remove('active');
            }

            bringToFront() {
                let maxZ = 1000;
                document.querySelectorAll('.window').forEach(win => {
                    const z = parseInt(win.style.zIndex) || 1000;
                    if (z > maxZ) maxZ = z;
                });
                this.element.style.zIndex = maxZ + 1;
            }
        }

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 15 + 5) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }

        // Ripple effect on click
        function createRipple(e, element) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = e.clientX - rect.left - size / 2 + 'px';
            ripple.style.top = e.clientY - rect.top - size / 2 + 'px';
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Terminal history
        let terminalHistory = [];
        let historyIndex = -1;
        let terminalInitialized = false;

        function initTerminal() {
            const output = document.getElementById('terminal-output');
            const input = document.getElementById('terminal-input');
            if (!output || !input) return;

            // Reset welcome message
            output.innerHTML = `<span style="color: #a6e3a1;">Welcome to GNOME Terminal!</span><br>Type 'help' for available commands.<br><br>`;

            // Only add event listener once
            if (terminalInitialized) {
                input.focus();
                return;
            }
            
            terminalInitialized = true;

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value.trim();
                    if (cmd) {
                        terminalHistory.push(cmd);
                        historyIndex = terminalHistory.length;
                        
                        // Process command
                        const parts = cmd.split(' ');
                        const command = parts[0].toLowerCase();
                        const args = parts.slice(1);

                        let result = '';
                        if (command === 'clear') {
                            output.innerHTML = '';
                            input.value = '';
                            return;
                        } else if (terminalCommands[command]) {
                            result = terminalCommands[command](args);
                        } else {
                            result = `<span style="color: #f38ba8;">Command not found: ${command}</span>
Type 'help' for available commands.`;
                        }

                        // Convert \n to <br> for proper HTML display
                        const formattedResult = result.replace(/\n/g, '<br>');
                        output.innerHTML += `<div style="line-height: 1.6;"><span style="color: #89b4fa; font-size: 14px;">[oom@linux ~]$</span> <span style="color: #f5c2e7; font-size: 14px;">${cmd}</span></div><div style="line-height: 1.6; font-size: 14px;">${formattedResult}</div><br>`;
                        input.value = '';
                        output.scrollTop = output.scrollHeight;
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        input.value = terminalHistory[historyIndex];
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < terminalHistory.length - 1) {
                        historyIndex++;
                        input.value = terminalHistory[historyIndex];
                    } else {
                        historyIndex = terminalHistory.length;
                        input.value = '';
                    }
                }
            });
        }

            // Create particles
            createParticles();

            // Initialize terminal after windows are created
            setTimeout(initTerminal, 100);

            // Clock
            function updateClock() {
                document.getElementById('statusClock').textContent = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'});
            }
            const clockEl = document.createElement('div');
            clockEl.id = 'statusClock';
            clockEl.style.color = '#fff';
            clockEl.style.fontWeight = 'bold';
            document.querySelector('.top-bar-right').appendChild(clockEl);
            updateClock();
            setInterval(updateClock, 30000);

            // App switcher
            const appSwitcher = document.getElementById('appSwitcher');
            const appMenu = document.getElementById('appMenu');
            appSwitcher.onclick = (e) => {
                e.stopPropagation();
                appMenu.classList.toggle('show');
                updateAppMenu();
            };
            document.onclick = () => appMenu.classList.remove('show');

            function updateAppMenu() {
                appMenu.innerHTML = '';
                windowManager.forEach(win => {
                    const item = document.createElement('div');
                    item.className = 'app-item';
                    item.textContent = win.element.querySelector('.window-title-gnome').textContent;
                    item.onclick = () => {
                        win.bringToFront();
                        win.show();
                        appMenu.classList.remove('show');
                    };
                    appMenu.appendChild(item);
                });
            }

            // Dash click handlers
            document.querySelectorAll('.dash-icon').forEach(icon => {
                icon.onclick = () => {
                    const windowId = icon.dataset.window;
                    let win = windowManager.find(w => w.id === windowId);
                    if (!win) {
                        win = new GnomeWindow(windowId);
                        windowManager.push(win);
                        win.show();
                        icon.classList.add('active');
                    } else if (!win.element.style.display || win.element.style.display === 'none') {
                        win.show();
                        icon.classList.add('active');
                    } else {
                        win.close();
                        icon.classList.remove('active');
                    }
                };
            });
        }

        init();
